version: '3.8'

services:
  user-service:
    build: ./services/user-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:password@users-db:5432/usersdb
      JWT_SECRET: supersecretkey
      PORT: 3001
    depends_on:
      users-db:
        condition: service_healthy

  users-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  product-service:
    build: ./services/product-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:password@products-db:5432/productsdb
      JWT_SECRET: supersecretkey
      PORT: 3002
    depends_on:
      products-db:
        condition: service_healthy

  products-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - products_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-service:
    build: ./services/order-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://postgres:password@orders-db:5432/ordersdb
      JWT_SECRET: supersecretkey
      PRODUCT_SERVICE_URL: http://product-service:3002
      PORT: 3003
    depends_on:
      orders-db:
        condition: service_healthy
      product-service:
        condition: service_started

  orders-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  users_data:
  products_data:
  orders_data:
